name: CI/CD Pipeline - Eclair School

on:
  push:
    branches:
      - '**' # Se déclenche sur n'importe quelle branche pour la CI
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'

jobs:
  # --- PARTIE CI : Analyse de code ---
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour l'historique de scan

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # --- PARTIE CD : Build et Push Docker (Uniquement sur main) ---
  build-and-push:
    name: Build & Push to DockerHub
    needs: sonarcloud # On attend obligatoirement que Sonar passe au vert
    runs-on: ubuntu-latest
    # Condition : Uniquement lors d'un push sur la branche main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eclair-school-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eclair-school-frontend:latest