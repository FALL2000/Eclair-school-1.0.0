services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: eclair_school
      MYSQL_USER: school
      MYSQL_PASSWORD: eclair
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - HOST_IP=0.0.0.0

volumes:
  db_data: